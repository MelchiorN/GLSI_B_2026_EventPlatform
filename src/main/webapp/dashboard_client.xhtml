<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                template="/WEB-INF/template.xhtml">
    
    <ui:define name="title">Dashboard Client - Mes Billets</ui:define>
    
    <ui:define name="head">
        <link rel="stylesheet" href="#{request.contextPath}/resources/css/dashboard-client.css"/>
    </ui:define>
    
    <ui:define name="pageIcon">
        <i class="pi pi-ticket"></i>
    </ui:define>
    
    <ui:define name="pageTitle">
        Mes Billets
    </ui:define>
    
    <ui:define name="content">
        <style>
            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
                margin-bottom: 30px;
            }
            
            .stat-card {
                background: white;
                padding: 25px;
                border-radius: 12px;
                box-shadow: 0 4px 16px rgba(0, 71, 255, 0.1);
                display: flex;
                align-items: center;
                gap: 20px;
                transition: transform 0.3s ease;
            }
            
            .stat-card:hover {
                transform: translateY(-5px);
            }
            
            .stat-icon {
                width: 60px;
                height: 60px;
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 28px;
                color: white;
            }
            
            .stat-icon.blue {
                background: linear-gradient(135deg, #0047FF 0%, #0039CC 100%);
            }
            
            .stat-icon.green {
                background: linear-gradient(135deg, #4caf50 0%, #388e3c 100%);
            }
            
            .stat-icon.orange {
                background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            }
            
            .stat-content {
                flex: 1;
            }
            
            .stat-label {
                font-size: 14px;
                color: #6c757d;
                margin-bottom: 5px;
            }
            
            .stat-value {
                font-size: 28px;
                font-weight: 700;
                color: #2c3e50;
            }
            
            .ui-panel {
                border-radius: 12px !important;
                border: none !important;
                box-shadow: 0 4px 16px rgba(0, 71, 255, 0.1) !important;
                margin-bottom: 30px;
                background: white !important;
            }
            
            .ui-panel .ui-panel-titlebar {
                background: linear-gradient(135deg, #0047FF 0%, #0039CC 100%) !important;
                border: none !important;
                border-radius: 12px 12px 0 0 !important;
                padding: 20px 25px !important;
                color: white !important;
                font-size: 18px !important;
                font-weight: 600 !important;
            }
            
            .ui-panel .ui-panel-content {
                padding: 30px !important;
                background: white !important;
                border-radius: 0 0 12px 12px !important;
            }
            
            .ui-datatable {
                border-radius: 12px !important;
                overflow: hidden !important;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05) !important;
            }
            
            .ui-datatable .ui-datatable-thead > tr > th {
                background: #f8f9fa !important;
                color: #2c3e50 !important;
                font-weight: 600 !important;
                padding: 16px !important;
                border: none !important;
                border-bottom: 2px solid #0047FF !important;
                font-size: 14px !important;
                text-transform: uppercase !important;
                letter-spacing: 0.5px !important;
            }
            
            .ui-datatable .ui-datatable-data > tr > td {
                padding: 16px !important;
                border: none !important;
                border-bottom: 1px solid #f1f3f5 !important;
                font-size: 15px !important;
                color: #495057 !important;
            }
            
            .ui-datatable .ui-datatable-data > tr:hover {
                background: #f8f9ff !important;
            }
            
            .badge {
                padding: 6px 12px;
                border-radius: 6px;
                font-weight: 600;
                font-size: 13px;
                display: inline-block;
            }
            
            .badge-success {
                background: #e8f5e9;
                color: #2e7d32;
            }
            
            .badge-warning {
                background: #fff3e0;
                color: #e65100;
            }
            
            .badge-info {
                background: #e3f2fd;
                color: #0047FF;
            }
            
            .btn-action {
                background: #0047FF !important;
                border: none !important;
                color: white !important;
                padding: 8px 16px !important;
                border-radius: 6px !important;
                font-size: 14px !important;
                font-weight: 600 !important;
                transition: all 0.3s ease !important;
            }
            
            .btn-action:hover {
                background: #0039CC !important;
                transform: translateY(-2px);
            }
        </style>
        
       
        
        
        
        
        
    </ui:define>
</ui:composition>
